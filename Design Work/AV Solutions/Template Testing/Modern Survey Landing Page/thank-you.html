<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Thanks for the feedback!</title>
  <link rel="stylesheet" href="thank-you.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>
<section id="response-page">
<nav id="top-nav">
    <img id="logo" src="logo.png" alt="AV Solutions Logo">
  <div id="nav-buttons"><a href="/">Home</a>
    <a href="/about">About</a>
    <a href="/services">Services</a>
    <button id="contact-button">Contact Us</button>
  </div>
</nav>
  <div id="response-card">
    <h1>We appreciate your feedback</h1>
    <p class="feedback-message">Your input helps us improve every experience.</p>
    <p class="nps-question">On a scale of 1-10, how likely is it that you would recommend AV Solutions to a friend or colleague?</p>

    <div id="nps-options">
      <button class="nps-option">1</button>
      <button class="nps-option">2</button>
      <button class="nps-option">3</button>
      <button class="nps-option">4</button>
      <button class="nps-option">5</button>
      <button class="nps-option">6</button>
      <button class="nps-option">7</button>
      <button class="nps-option">8</button>
      <button class="nps-option">9</button>
      <button class="nps-option">10</button>
    </div>
    <div id="scale-labels">
      <span>Not Likely</span>
      <div id="line"></div>
      <span>Very Likely</span>
    </div>
    <div id="submit">
      <button>Cancel</button>
      <button>Submit</button>
    </div>
  </div>
</section>
<script src="thank-you.js"></script>
</body>
</html>
</body>
</html>
